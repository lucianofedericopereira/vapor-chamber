name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + typecheck are platform-independent — run once, not across the test matrix.
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:check

  test:
    name: test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # 20.19.0 = floor (engines); 22, 24 = current actives. All satisfy Vite 8's
        # `^20.19.0 || >=22.12.0`.
        node: ['20.19.0', '22', '24']
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # `npm ci` runs the `prepare` script, which builds dist/ (consumed by the
      # tree-shake/IIFE tests and the size checks) — so no separate build step.
      - run: npm ci
      - run: npm run test:run
      - run: node scripts/check-size.mjs
      - run: npm run loc
      # Generated size docs must match reality. One deterministic matrix entry only.
      - if: matrix.os == 'ubuntu-latest' && matrix.node == '24'
        name: docs bundle sizes are fresh
        run: npm run size:doc && git diff --exit-code docs/BUNDLE-SIZES.md
      # Coverage gate on the canonical entry only (threshold in vitest.config.ts).
      - if: matrix.os == 'ubuntu-latest' && matrix.node == '24'
        run: npm run test:coverage

  bench:
    name: bench smoke (no regression vs baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # pipefail so a bench failure fails the step (otherwise the exit code is tee's, always 0)
      - run: set -o pipefail; npx vitest bench --run tests/perf.bench.ts 2>&1 | tee bench.txt
        shell: bash
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-results
          path: bench.txt
          retention-days: 14
