name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 1. CHANGE HERE: Expanded permissions to support BOTH git pushes and Pages deployments
permissions:
  contents: write
  pages: write      # <-- ADDED
  id-token: write   # <-- ADDED

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:check

  test:
    name: test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Astro 7 (examples/exo-astro) requires Node >=22.12.0, and the root
        # test suite imports that example's source directly — so Node 20 is
        # not a supported CI target.
        node: ['22', '24']
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # examples/exo-astro/node_modules is gitignored, but tests/examples/
      # exo-astro-directives.test.ts imports the example's source directly,
      # and its tsconfig.json extends astro/tsconfigs/base — so Vite's oxc
      # transform can't load that tsconfig without astro installed.
      - run: npm ci --prefix examples/exo-astro
      - run: npm run test:run
      - run: node scripts/check-size.mjs
      - run: npm run loc
      
      - name: Update bundle sizes docs
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: |
          npm run size:doc
          if ! git diff --exit-code docs/BUNDLE-SIZES.md; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/BUNDLE-SIZES.md
            git commit -m "docs: auto-update bundle sizes [skip ci]"
            git push
          fi

      - if: matrix.os == 'ubuntu-latest' && matrix.node == '24'
        run: npm run test:coverage

  bench:
    name: bench smoke (no regression vs baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: set -o pipefail; npx vitest bench --run tests/perf.bench.ts 2>&1 | tee bench.txt
        shell: bash
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-results
          path: bench.txt
          retention-days: 14

  # 2. CHANGE HERE: Add this entire new job at the very bottom of the file
  deploy-docs:
    name: deploy docs
    needs: [test, lint] # Forces this to wait until tests finish and bundle sizes are pushed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: main # Pulls the fresh commit that includes the bundle sizes bot update
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      
      - run: npm run docs
      
      # 3. CRITICAL LINE: Creates the bypass file inside your output directory before uploading
      - run: touch docs/api/.nojekyll # <-- ADDED HERE
      
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/api
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0