name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20.19.0', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:check
      - run: npm run test:run
      - run: npm run build
      - run: node scripts/check-size.mjs
      # Coverage gate runs only on the canonical matrix entry to avoid 4×
      # redundant coverage runs. Threshold enforced in vitest.config.ts.
      - if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm run test:coverage

  bench:
    name: bench smoke (no regression vs baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx vitest bench --run tests/perf.bench.ts 2>&1 | tee bench.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.txt
          retention-days: 14
