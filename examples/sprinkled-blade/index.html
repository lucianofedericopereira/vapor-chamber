<!--
  vapor-chamber — sprinkled-JS demo for server-rendered pages.

  Drop-in pattern: Blade / Rails / Django / WordPress emits HTML with a
  CSRF meta tag, then loads the IIFE bundle and wires interactive bits
  via `VaporChamber.connect()`.

  Runnable with ONE process — the mock backend also serves this page, with the
  cart already rendered into it (the Blade half of the pattern):

    cd examples/sprinkled-blade
    node mock-server.mjs        # → http://localhost:3001

  Serving it as a plain static file still works and is the cross-origin case
  (CORS preflight, absolute endpoint, one startup fetch to hydrate the count):

    node ../static-server.mjs   # → http://localhost:3000/examples/sprinkled-blade/index.html
    node mock-server.mjs        # backend on :3001

  In a real Laravel deploy, replace the meta tag with `{{ csrf_token() }}`
  and route `/api/vc` to your VaporChamberController. See
  ../laravel-backend/ for runnable PHP companions.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="demo-csrf-token-replace-with-blade-csrf_token" />
  <title>vapor-chamber — sprinkled-JS / Blade demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: wait; }
    .panel { border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; border-radius: 6px; }
    .row { display: flex; gap: 1rem; align-items: center; }
    /* Nothing below may move when state changes. The status line always
       occupies its line even while empty, and the counter reserves room for
       the digits it will grow into (tabular figures keep them from jittering
       as values change). Reflow is the flicker people actually notice —
       fetch latency is only the half you can see coming. */
    #status { min-height: 1.4em; margin: 0.75rem 0 0; }
    #count { font-variant-numeric: tabular-nums; min-width: 18ch; }
    #log { min-height: 8.5em; }
    .ok { color: #060; }
    .err { color: #c00; }
    pre { background: #f5f5f5; padding: 0.5rem; border-radius: 4px; overflow: auto; font-size: 12px; }
  </style>
</head>
<body>

  <h1>Sprinkled-JS demo</h1>
  <p>
    Server-rendered HTML page (think Blade / Rails / Django).
    Vue is <em>not</em> involved; just vapor-chamber's IIFE bundle dispatching
    commands to a backend over HTTP.
  </p>

  <div class="panel">
    <h2>Cart</h2>
    <div class="row">
      <button id="add">Add to cart</button>
      <button id="clear">Clear</button>
      <!-- Served from the backend (http://localhost:3001), this span arrives
           already filled in and stamped `data-hydrated` — the Blade
           `{{ $cart->count }}` moment: first paint is correct, no flicker,
           no startup request. Served as a static file it arrives empty and
           the script fetches `cartState` once, which is the flicker that
           server-rendering buys away. What it must never do is hardcode 0:
           the cart lives on the server and outlives the page. -->
      <span id="count" data-cart></span>
    </div>
    <p id="status"></p>
  </div>

  <div class="panel">
    <h2>Telemetry log</h2>
    <p>Every dispatch is logged here client-side via <code>bus.on('*', …)</code>.</p>
    <pre id="log">(waiting…)</pre>
  </div>

  <!-- In production: load from CDN
       <script src="https://cdn.jsdelivr.net/npm/vapor-chamber@1.9/dist/vapor-chamber-core.iife.min.js"></script> -->
  <!-- For local dev, point at the locally-built bundle: -->
  <script src="../../dist/vapor-chamber-core.iife.min.js"></script>

  <script>
    // One-line bus + HTTP transport setup. csrf:true reads the meta tag
    // automatically and attaches X-CSRF-TOKEN to every request.
    // Same origin when the backend served this page (no CORS at all — the
    // real Blade shape); absolute when it was opened from a static host.
    const { bus, dispatch } = VaporChamber.connect({
      endpoint: document.getElementById('count').hasAttribute('data-hydrated')
        ? '/api/vc'
        : 'http://localhost:3001/api/vc',
    });

    // Telemetry: log every successful dispatch + failure to the page.
    const logEl = document.getElementById('log');
    const lines = [];
    bus.on('*', (cmd, result) => {
      const ts = new Date().toTimeString().slice(0, 8);
      lines.unshift(`[${ts}] ${cmd.action} → ${result.ok ? 'ok' : 'fail: ' + result.error?.message}`);
      logEl.textContent = lines.slice(0, 8).join('\n');
    });

    // UI: cart counter
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('add');

    const render = (state) => {
      countEl.textContent = `${state.count} items (total: $${state.total.toFixed(2)})`;
    };

    const run = async (action, target, payload, okMessage) => {
      // Do NOT blank the status here. Clearing it on click and refilling it a
      // few ms later is a visible blink on a local round trip — the message is
      // replaced when the result lands, never emptied in between.
      //
      // Same reasoning for the disabled state: a busy affordance that shows
      // and hides inside ~100ms reads as a glitch, not as feedback. It only
      // appears if the dispatch is genuinely slow enough to be worth showing.
      const busy = setTimeout(() => { btn.disabled = true; }, 120);

      const result = await dispatch(action, target, payload);

      clearTimeout(busy);
      btn.disabled = false;
      if (result.ok) {
        render(result.value);
        statusEl.innerHTML = `<span class="ok">${okMessage}</span>`;
      } else {
        statusEl.innerHTML = `<span class="err">Error: ${result.error.message}</span>`;
      }
      return result;
    };

    btn.addEventListener('click', () => run('cartAdd', { id: 1 }, { qty: 1 }, 'Added.'));
    document.getElementById('clear')
      .addEventListener('click', () => run('cartClear', {}, null, 'Cleared.'));

    // Hydrate the counter ONLY if the server didn't already render it. The
    // cart is server state: it survives reloads and is shared by every tab
    // pointed at this backend, so the page must never assume a number — it
    // either receives one in the HTML or asks for one.
    if (!countEl.hasAttribute('data-hydrated')) {
      dispatch('cartState', {}, null).then((result) => {
        if (result.ok) render(result.value);
        else countEl.textContent = 'cart unavailable';
      });
    }
  </script>

</body>
</html>
