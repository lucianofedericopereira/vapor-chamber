<!--
  Pattern 1: Blade + CDN (zero build)
  ====================================
  No npm. No Vite. No build step.
  Drop VaporChamber into any Blade template via script tag.

  Backend receives: { "command": "cartAdd", "target": {...}, "payload": {...} }
  Backend returns:  { "state": { "count": 3 } }
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vapor Chamber — Blade + CDN</title>
</head>
<body>

<!-- Blade template: resources/views/cart.blade.php -->
<div id="app">
  <button id="add-btn">Add to cart</button>
  <button id="clear-btn">Clear</button>
  <span id="cart-count">0 items</span>
  <p id="error-msg" style="color:red;display:none"></p>
</div>

<!-- No npm, no build — one script tag. Three ways to serve that tag:
     1. self-hosted (below): what `examples/laravel-app` actually does — it
        copies the IIFE into public/js/. Best default for Blade: no third-party
        origin in your CSP, no CDN outage in your checkout path.
     2. CDN, VERSION-PINNED:
        <script src="https://cdn.jsdelivr.net/npm/vapor-chamber@1.9/dist/vapor-chamber.iife.min.js"></script>
     3. CDN, unpinned — `npm/vapor-chamber/...` with no @version. Avoid: it
        resolves to whatever is published *now* and is edge-cached, so the page
        silently changes under you on every release, and it can never be run
        against unreleased code. This example used to do that, which made it
        the one example nobody could verify before publishing — and the one
        that shipped broken.

     Local path so this file is runnable today:
       node examples/static-server.mjs
       open http://localhost:3000/examples/pattern-1-blade-cdn.html -->
<script src="../../dist/vapor-chamber.iife.min.js"></script>
<script>
  const { bus, dispatch } = VaporChamber.createApp({
    transport: VaporChamber.http({
      endpoint: '/api/vc',
      csrf: true,             // reads X-XSRF-TOKEN from cookie automatically
    }),
  })

  // Persist cart count across page reloads. persist() is used here only for
  // its load()/save() storage helpers — we save explicitly below, because the
  // HTTP transport handles matching commands itself (it does not fall through
  // to local plugins/handlers).
  const cartPersist = VaporChamber.persist({
    key: 'vc:cart',
    getState: () => ({ count: parseInt(document.getElementById('cart-count').textContent) }),
  })

  // Restore on page load
  const saved = cartPersist.load()
  if (saved) {
    document.getElementById('cart-count').textContent = saved.count + ' items'
  }

  // Local side effects go in a LISTENER, not a handler: the HTTP transport
  // forwards every matching command to the server (a registered handler would
  // never run). on() listeners fire after the dispatch settles, with the
  // server's state in result.value.
  // One listener for both commands: whatever the server says the cart is,
  // that is what the page shows — and only then is it persisted. The local
  // copy is a cache of the server's answer, never a second source of truth.
  bus.on('cartAdd', (cmd, result) => render(result))
  bus.on('cartClear', (cmd, result) => render(result))

  function render(result) {
    if (!result.ok) return
    document.getElementById('cart-count').textContent = result.value.count + ' items'
    cartPersist.save()
  }

  // Wire up buttons. Note both go through the SAME dispatch path — a button
  // is just a call site; the transport decides where the command runs.
  const send = async (btn, action, target, payload) => {
    btn.disabled = true
    const result = await dispatch(action, target, payload)
    btn.disabled = false
    const err = document.getElementById('error-msg')
    if (result.ok) {
      err.style.display = 'none'
    } else {
      err.textContent = result.error?.message ?? 'Unknown error'
      err.style.display = ''
    }
  }

  const addBtn = document.getElementById('add-btn')
  addBtn.addEventListener('click', () => send(addBtn, 'cartAdd', { id: 1 }, { quantity: 1 }))

  // Clear resets the SERVER cart; the listener above then overwrites the
  // persisted copy with the server's zero. Without this, a restored count
  // from localStorage has no way back down — the page would keep showing a
  // number the backend no longer agrees with.
  const clearBtn = document.getElementById('clear-btn')
  clearBtn.addEventListener('click', () => send(clearBtn, 'cartClear', {}, null))
</script>

<!--
  Laravel backend (no Livewire):

  // routes/api.php
  Route::post('/vc', VaporChamberController::class);

  // app/Http/Controllers/VaporChamberController.php
  public function __invoke(Request $request): JsonResponse
  {
      $command = $request->input('command');
      $payload = $request->input('payload');

      $state = match ($command) {
          'cartAdd' => $this->cartService->add($payload),
          default    => abort(404),
      };

      return response()->json(['state' => $state]);
  }
-->
</body>
</html>
